name=leaksense-p2

# This project is fully self-contained for LOCAL Workbench/CLI compiles.
# JsonParserGeneratorRK is VENDORED in lib/JsonParserGeneratorRK/ because the
# local toolchain does not auto-fetch registry dependencies into lib/.
# (That is what caused "JsonParserGeneratorRK.h: No such file".)
#
# No registry dependencies are required to build the default configuration.

# --- IMU (LSM6DS), OPTIONAL, OFF by default (USE_IMU in app_config.h) ---
# Not in the Particle registry. To enable, vendor these into lib/ as well
# (see README section 8) and set USE_IMU 1:
#   lib/Adafruit_LSM6DS/  lib/Adafruit_BusIO/  lib/Adafruit_Sensor/

# Build targets: P2 -> 5.6.0+ ; Argon/Boron (Gen3) -> 6.2.x
